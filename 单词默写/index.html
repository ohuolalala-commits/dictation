<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语默写本</title>
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<!-- ========== 登录浮层 ========== -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2 id="authTitle">📝 英语默写本</h2>
    <div class="auth-sub" id="authSub">登录以开始练习</div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-name-row" id="authNameRow" style="display:none">
      <input type="text" id="authDisplayName" placeholder="显示名称（如：张三）">
    </div>
    <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
    <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
    <div class="auth-remember">
      <input type="checkbox" id="authRemember" checked>
      <label for="authRemember">记住我（7天内自动登录）</label>
    </div>
    <button class="auth-btn auth-btn-primary" id="authBtn" onclick="handleAuth()">登 录</button>
    <button class="auth-btn auth-btn-secondary" id="authToggleBtn" onclick="toggleAuthMode()" style="display:none">老师首次使用？点此注册</button>
    <div class="auth-toggle" id="authToggle" onclick="toggleAuthMode()">老师首次使用？点此注册</div>
  </div>
</div>

<div class="container">
<div class="header">
  <button class="btn-logout" id="btnLogout" onclick="handleLogout()">🚪 退出</button>
  <h1 id="headerTitle">📝 介词短语默写<span class="user-tag" id="userTag">👤 </span></h1>
  <div class="subtitle" id="headerSub">高考核心介词搭配 · 四类全覆盖</div>
  <div class="bank-select-wrap">
    <label for="bankSelect">📚 词库：</label>
    <select class="bank-select" id="bankSelect">
      <option value="preposition">介词短语（高考核心）</option>
      <option value="bnu">北师大版</option>
      <option value="pep">人教版</option>
      <option value="pe">PEP版·六年级下册</option>
      <option value="fltrp">外研社版</option>
      <option value="pastTense">小学过去时·不规则动词</option>
      <option value="zk">中考高频词</option>
      <option value="zk688">基础版688</option>
      <option value="grade7a">📗 七年级上册</option>
    </select>
    <div class="section-filter-wrap" id="sectionFilterWrap" style="display:none">
      <label for="sectionFilter">📊 板块：</label>
      <select class="bank-select" id="sectionFilter" onchange="applySectionFilter()">
        <option value="">全部</option>
      </select>
    </div>
  </div>
</div>
<div class="progress-wrap">
<div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar"></div></div>
<div class="progress-text" id="progressText">0 / 48</div>
<div style="display:flex;justify-content:center;gap:8px;margin-top:6px">
  <button class="btn-wrong-book" id="btnWrongBook" onclick="toggleWrongMode()" style="display:none">📕 错题本 <span class="badge" id="wrongBadge">0</span></button>
  <span id="streakBadge" style="display:none;font-size:13px;font-weight:bold;color:#f4d87c;background:linear-gradient(180deg,#8b2500,#a03a20);padding:4px 12px;border-radius:12px;animation:pulse 0.8s ease infinite alternate">🔥 0连击</span>
</div>
</div>

<div class="mode-bar" id="modeBar">🔁 错题复习模式 — 只显示答错的词</div>

<div class="all-done" id="allDone">
<div class="trophy">🏆</div><h2>全部完成！太棒了！</h2>
<p style="color:#666;font-size:16px" id="allDoneMsg">你已经掌握了所有高考核心介词搭配！</p>
<button class="btn btn-nav" style="margin-top:20px" onclick="resetAll()">再来一次</button>
</div>

<div class="card" id="card">
<div class="section-label" id="sectionLabel"></div>
<div class="tip-box" id="tipBox"></div>
<div class="prompt-main" id="promptMain"></div>
<div class="prompt-cn" id="promptCn"></div>
<textarea id="inputArea" placeholder="输入英文内容..."></textarea>
<div class="actions">
<button class="btn btn-check" onclick="checkAnswer()">✅ 检查</button>
<button class="btn btn-hint" onclick="showHint()">💡 提示</button>
<button class="btn btn-show" onclick="revealAnswer()">👁 看答案</button>
</div>
<div class="feedback" id="feedback"></div>
<div class="actions" style="margin-top:16px">
<button class="btn btn-nav" id="btnPrev" onclick="prevItem()" disabled>◀ 上一个</button>
<span style="flex:1"></span>
<button class="btn btn-nav" id="btnNext" onclick="nextItem()">下一个 ▶</button>
</div>
</div>
</div>

<canvas id="confetti"></canvas>
<div class="celebrate-overlay" id="celebrateOverlay"></div>
<div class="celebrate-center" id="celebrateCenter">
<svg class="checkmark" viewBox="0 0 52 52"><circle class="checkmark-circle" cx="26" cy="26" r="25"/><path class="checkmark-check" d="M14 27l7 7 16-16" fill="none"/></svg>
<div class="celebrate-text" id="celebrateText"></div><div class="celebrate-sub" id="celebrateSub"></div>
<button class="btn btn-nav" style="pointer-events:auto;margin-top:8px" onclick="dismissCelebrate()">继续</button>
</div>
